<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Cấu hình các thẻ Meta SEO cơ bản để đảm bảo công cụ tìm kiếm hiểu rõ nội dung trang web -->
  <title>Thư viện - HVG Education</title>
  <meta name="description" content="HVG Education cung cấp các chương trình đào tạo Anh ngữ hàng đầu chất lượng cao.">

  <!-- Nhúng CSS Bootstrap 5 để tận dụng các class tiện ích như flexbox, responsive grid và spacing -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- 
    Liên kết tệp CSS toàn cục (global.css):
    - Dùng để tải font chữ Google Font Inter.
    - Định nghĩa hệ màu sắc thương hiệu chủ đạo (Design Tokens) để toàn dự án sử dụng nhất quán.
  -->
  <link href="../styles/global.css" rel="stylesheet">

  <!-- Liên kết tệp CSS riêng của các component như Topbar, Navbar và Footer -->
  <link href="../styles/topbar.css" rel="stylesheet">
  <link href="../styles/navbar.css" rel="stylesheet">
  <link href="../styles/footer.css" rel="stylesheet">
</head>

<body>

  <!-- Khai báo các vùng chứa để tải động nội dung của Topbar và Navbar qua jQuery AJAX -->
  <header>
    <div id="topbar-placeholder"></div>
    <div id="navbar-placeholder"></div>
  </header>

  <main>
    <!-- Nội dung của trang Thư viện sẽ được chèn ở đây -->
  </main>

  <!-- Khai báo vùng chứa của Footer để tải động nội dung từ footer.html qua jQuery AJAX -->
  <footer>
    <div id="footer-placeholder"></div>
  </footer>

  <!-- 
    Nhúng thư viện jQuery CDN phiên bản 3.7.1:
    - Bắt buộc phải nhúng thư viện này trước tệp scripts/main.js tự viết nhằm sử dụng hàm $.load()
  -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Nhúng thư viện Bootstrap Bundle (chứa cả Popper.js) hỗ trợ các tính năng động trong tương lai của Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- 
    Liên kết tệp JavaScript điều khiển chính (main.js):
    - Đã tách mã khởi chạy jQuery load các component (Topbar, Navbar, Footer) ra khỏi index.html.
  -->
  <script src="../scripts/main.js"></script>
</body>

</html>
